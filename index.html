<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KANRI — Ameba Servizi Srl</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;500;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap');

:root {
  --green: #00FF9C;
  --green-dark: #00CC7A;
  --green-glow: rgba(0,255,156,0.25);
  --green-light: rgba(0,255,156,0.08);
  --amber: #FFD600;
  --amber-light: rgba(255,214,0,0.12);
  --red: #FF3B5C;
  --red-light: rgba(255,59,92,0.12);
  --blue: #00CFFF;
  --blue-light: rgba(0,207,255,0.12);
  --bg-base: #080C10;
  --bg-card: #0D1117;
  --bg-raised: #121920;
  --bg-hover: #1A2332;
  --border: rgba(0,255,156,0.15);
  --border-subtle: rgba(255,255,255,0.06);
  --text-primary: #E8F4F0;
  --text-secondary: #7A9E8E;
  --text-muted: #3D5C50;
  --white: #FFFFFF;
  --font: 'DM Sans', sans-serif;
  --mono: 'Share Tech Mono', monospace;
  --orbitron: 'Orbitron', sans-serif;
  --radius: 4px;
  --radius-lg: 6px;
  --shadow: 0 0 20px rgba(0,255,156,0.05);
  --glow: 0 0 12px rgba(0,255,156,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: var(--font); background: var(--bg-base); color: var(--text-primary); font-size: 14px; }

/* Y2K scanlines overlay */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 9999;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none;
}

/* Y2K grid background */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(0,255,156,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,156,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* TOPBAR */
.topbar {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 0 30px rgba(0,255,156,0.08);
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-mark {
  width: 40px; height: 40px;
  background: transparent;
  border: 1px solid var(--green);
  border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  color: var(--green); font-weight: 400; font-size: 13px;
  font-family: var(--mono);
  box-shadow: var(--glow), inset 0 0 12px rgba(0,255,156,0.1);
  text-shadow: 0 0 8px rgba(0,255,156,0.8);
  letter-spacing: 0;
}
.logo-text { font-family: var(--orbitron); font-size: 13px; font-weight: 700; letter-spacing: 0.15em; color: var(--text-primary); }
.logo-text span { color: var(--text-secondary); font-weight: 400; font-size: 11px; letter-spacing: 0.08em; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.sync-pill {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--text-secondary);
  font-family: var(--mono);
  background: var(--bg-raised); border: 1px solid var(--border);
  padding: 5px 12px; border-radius: 2px; cursor: pointer;
  transition: all 0.15s;
}
.sync-pill:hover { border-color: var(--green); color: var(--green); }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; box-shadow: 0 0 6px var(--green); }
.sync-dot.loading { background: var(--amber); animation: pulse 0.8s infinite; box-shadow: 0 0 6px var(--amber); }
.sync-dot.error { background: var(--red); box-shadow: 0 0 6px var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
.btn-nuovo {
  background: transparent; color: var(--green);
  border: 1px solid var(--green);
  padding: 8px 18px; border-radius: var(--radius);
  font-family: var(--orbitron); font-size: 11px; font-weight: 600;
  letter-spacing: 0.1em;
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
  box-shadow: 0 0 10px rgba(0,255,156,0.2);
}
.btn-nuovo:hover { background: var(--green-glow); box-shadow: var(--glow); }

/* METRICS */
.metrics-bar {
  display: grid; grid-template-columns: repeat(5, 1fr);
  gap: 1px; padding: 0;
  background: var(--border);
  border-bottom: 1px solid var(--border);
}
.metric {
  background: var(--bg-card);
  padding: 16px 20px;
  position: relative; overflow: hidden;
}
.metric::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 1px; background: linear-gradient(90deg, transparent, var(--green), transparent);
  opacity: 0.4;
}
.metric-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 6px; font-family: var(--mono); }
.metric-value { font-size: 28px; font-weight: 700; font-family: var(--orbitron); line-height: 1; color: var(--text-primary); }
.metric-value.amber { color: var(--amber); text-shadow: 0 0 12px rgba(255,214,0,0.5); }
.metric-value.red { color: var(--red); text-shadow: 0 0 12px rgba(255,59,92,0.5); }
.metric-value.green { color: var(--green); text-shadow: 0 0 12px rgba(0,255,156,0.5); }
.metric-value.blue { color: var(--blue); text-shadow: 0 0 12px rgba(0,207,255,0.5); }

/* TOOLBAR */
.toolbar {
  display: flex; gap: 10px; align-items: center;
  padding: 12px 24px; flex-wrap: wrap;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border-subtle);
}
.search-wrap { position: relative; flex: 1; min-width: 200px; }
.search-wrap input {
  width: 100%; font-family: var(--mono); font-size: 12px;
  padding: 8px 12px 8px 34px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--bg-raised); color: var(--text-primary); outline: none;
  transition: all 0.15s;
}
.search-wrap input::placeholder { color: var(--text-muted); }
.search-wrap input:focus { border-color: var(--green); box-shadow: 0 0 8px var(--green-glow); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 13px; pointer-events: none; }
.tab-group { display: flex; gap: 2px; background: var(--bg-raised); padding: 3px; border-radius: var(--radius); border: 1px solid var(--border); }
.tab {
  font-family: var(--mono); font-size: 11px; font-weight: 400; letter-spacing: 0.05em;
  padding: 5px 14px; border-radius: 2px; border: none;
  background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s;
  text-transform: uppercase;
}
.tab.active { background: var(--green-light); color: var(--green); box-shadow: inset 0 0 8px var(--green-glow); border: 1px solid var(--border); }
.toolbar select {
  font-family: var(--mono); font-size: 11px; padding: 8px 12px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--bg-raised); color: var(--text-secondary); outline: none; cursor: pointer;
}

/* TABLE */
.table-wrap {
  margin: 0 24px 24px; background: var(--bg-card);
  border-radius: var(--radius); border: 1px solid var(--border);
  overflow: hidden; box-shadow: var(--shadow);
  position: relative; z-index: 1;
}
table { width: 100%; border-collapse: collapse; table-layout: fixed; }
thead { background: var(--bg-raised); }
th {
  font-size: 10px; font-weight: 600; color: var(--green);
  text-transform: uppercase; letter-spacing: 0.12em;
  padding: 10px 14px; text-align: left;
  border-bottom: 1px solid var(--border); white-space: nowrap;
  font-family: var(--mono);
}
td {
  padding: 11px 14px; border-bottom: 1px solid var(--border-subtle);
  font-size: 12px; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; vertical-align: middle;
  color: var(--text-primary);
}
tr:last-child td { border-bottom: none; }
tbody tr { transition: background 0.1s; }
tbody tr:hover td { background: var(--bg-hover); cursor: pointer; }
.ticket-id { font-family: var(--mono); font-size: 11px; color: var(--green); opacity: 0.7; }
.ubicazione-cell { font-weight: 500; color: var(--text-primary); }
.indirizzo-cell { color: var(--text-secondary); font-size: 11px; font-family: var(--mono); }

/* BADGES */
.badge {
  display: inline-flex; align-items: center;
  font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
  padding: 3px 8px; border-radius: 2px; white-space: nowrap;
  font-family: var(--mono); text-transform: uppercase;
}
.b-aperto { background: rgba(255,214,0,0.1); color: var(--amber); border: 1px solid rgba(255,214,0,0.3); }
.b-lav { background: rgba(0,207,255,0.1); color: var(--blue); border: 1px solid rgba(0,207,255,0.3); }
.b-chiuso { background: rgba(0,255,156,0.1); color: var(--green); border: 1px solid rgba(0,255,156,0.3); }
.b-scaduto { background: rgba(255,59,92,0.1); color: var(--red); border: 1px solid rgba(255,59,92,0.3); }
.b-gray { background: var(--bg-raised); color: var(--text-secondary); border: 1px solid var(--border); }
.b-app { background: var(--bg-raised); color: var(--blue); border: 1px solid rgba(0,207,255,0.2); font-size: 10px; font-family: var(--mono); }

/* SLA BAR */
.sla-wrap { display: flex; align-items: center; gap: 6px; }
.sla-track { flex: 1; height: 4px; background: var(--gray-100); border-radius: 4px; overflow: hidden; min-width: 36px; }
.sla-fill { height: 100%; border-radius: 4px; }
.sla-lbl { font-size: 11px; font-family: var(--mono); min-width: 38px; text-align: right; }

/* DETAIL PANEL */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 200;
  backdrop-filter: blur(2px);
}
.overlay.open { display: block; }
.panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 480px; background: var(--bg-card);
  overflow-y: auto; padding: 24px;
  border-left: 1px solid var(--border);
  box-shadow: -8px 0 40px rgba(0,255,156,0.06);
  animation: slideIn 0.2s ease;
  z-index: 201;
}
@keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
.panel-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.panel-title { font-size: 14px; font-weight: 600; line-height: 1.3; font-family: var(--orbitron); color: var(--text-primary); letter-spacing: 0.05em; }
.panel-sub { font-size: 11px; color: var(--green); margin-top: 4px; font-family: var(--mono); opacity: 0.7; }
.btn-close {
  background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius);
  width: 28px; height: 28px; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary); flex-shrink: 0; margin-left: 12px;
  transition: all 0.15s;
}
.btn-close:hover { border-color: var(--red); color: var(--red); }
.section { margin-bottom: 22px; }
.section-title {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.12em; color: var(--green); margin-bottom: 10px;
  padding-bottom: 6px; border-bottom: 1px solid var(--border);
  font-family: var(--mono);
}
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.field { background: var(--bg-raised); border-radius: var(--radius); padding: 10px 12px; border: 1px solid var(--border-subtle); }
.field.full { grid-column: 1/-1; }
.field-label { font-size: 10px; color: var(--text-muted); margin-bottom: 3px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; }
.field-value { font-size: 12px; font-weight: 500; word-break: break-word; line-height: 1.4; color: var(--text-primary); }
.field-value.mono { font-family: var(--mono); font-size: 12px; color: var(--green); }

.status-btns { display: flex; gap: 8px; }
.btn-st {
  flex: 1; font-family: var(--mono); font-size: 11px; font-weight: 600;
  padding: 8px 10px; border-radius: var(--radius); cursor: pointer;
  border: 1px solid var(--border); background: var(--bg-raised); color: var(--text-secondary);
  transition: all 0.15s; text-align: center; text-transform: uppercase; letter-spacing: 0.06em;
}
.btn-st:hover { border-color: var(--text-secondary); color: var(--text-primary); }
.btn-st.s-aperto { background: rgba(255,214,0,0.08); border-color: var(--amber); color: var(--amber); box-shadow: 0 0 8px rgba(255,214,0,0.2); }
.btn-st.s-lav { background: rgba(0,207,255,0.08); border-color: var(--blue); color: var(--blue); box-shadow: 0 0 8px rgba(0,207,255,0.2); }
.btn-st.s-chiuso { background: rgba(0,255,156,0.08); border-color: var(--green); color: var(--green); box-shadow: 0 0 8px rgba(0,255,156,0.2); }

.note-area {
  width: 100%; min-height: 90px; resize: vertical;
  font-family: var(--mono); font-size: 12px; line-height: 1.6;
  padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text-primary); background: var(--bg-raised); outline: none;
  transition: all 0.15s;
}
.note-area::placeholder { color: var(--text-muted); }
.note-area:focus { border-color: var(--green); box-shadow: 0 0 8px var(--green-glow); }
.btn-save {
  margin-top: 8px; font-family: var(--mono); font-size: 11px; font-weight: 600;
  padding: 7px 16px; border-radius: var(--radius); cursor: pointer;
  border: 1px solid var(--green); background: transparent; color: var(--green);
  text-transform: uppercase; letter-spacing: 0.08em;
  transition: all 0.15s;
}
.btn-save:hover { background: var(--green-glow); box-shadow: var(--glow); }
.btn-save:disabled { border-color: var(--border); color: var(--text-muted); cursor: not-allowed; box-shadow: none; }

/* MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.8); z-index: 300;
  align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg-card); border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 28px; width: 540px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 0 60px rgba(0,255,156,0.08);
  animation: fadeUp 0.2s ease;
}
@keyframes fadeUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-title { font-size: 13px; font-weight: 700; margin-bottom: 20px; font-family: var(--orbitron); color: var(--green); letter-spacing: 0.1em; text-transform: uppercase; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.form-field { display: flex; flex-direction: column; gap: 5px; }
.form-field.full { grid-column: 1/-1; }
.form-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; font-family: var(--mono); }
.form-input {
  font-family: var(--mono); font-size: 12px; padding: 8px 12px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--bg-raised); color: var(--text-primary); outline: none;
  transition: all 0.15s;
}
.form-input::placeholder { color: var(--text-muted); }
.form-input:focus { border-color: var(--green); box-shadow: 0 0 8px var(--green-glow); }
.modal-footer {
  display: flex; justify-content: flex-end; gap: 8px;
  border-top: 1px solid var(--border); padding-top: 16px; margin-top: 4px;
}
.btn-cancel {
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  padding: 8px 16px; border-radius: var(--radius); cursor: pointer;
  border: 1px solid var(--border); background: transparent; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: 0.06em;
}
.btn-cancel:hover { border-color: var(--red); color: var(--red); }
.btn-confirm {
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  padding: 8px 18px; border-radius: var(--radius); cursor: pointer;
  border: 1px solid var(--green); background: transparent; color: var(--green);
  text-transform: uppercase; letter-spacing: 0.06em;
  transition: all 0.15s;
}
.btn-confirm:hover { background: var(--green-glow); box-shadow: var(--glow); }
.btn-confirm:disabled { border-color: var(--border); color: var(--text-muted); cursor: not-allowed; box-shadow: none; }

/* MISC */
.empty-state { text-align: center; padding: 60px 24px; color: var(--text-muted); }
.empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 13px; font-family: var(--mono); }
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 500;
  background: var(--bg-raised); color: var(--text-primary);
  border: 1px solid var(--border);
  padding: 12px 20px; border-radius: var(--radius);
  font-size: 12px; font-weight: 500; font-family: var(--mono);
  transform: translateY(80px); opacity: 0;
  transition: all 0.25s ease; pointer-events: none;
  max-width: 320px;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.ok { border-color: var(--green); color: var(--green); box-shadow: 0 0 16px var(--green-glow); }
.toast.err { border-color: var(--red); color: var(--red); box-shadow: 0 0 16px rgba(255,59,92,0.2); }
.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid rgba(0,255,156,0.2); border-top-color: var(--green);
  border-radius: 50%; animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-mark">管理</div>
    <div class="logo-text">KANRI <span>— Ameba Servizi Srl</span></div>
  </div>
  <div class="topbar-right">
    <div class="sync-pill" onclick="loadTickets()" title="Clicca per aggiornare">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">Caricamento...</span>
    </div>
    <button class="btn-nuovo" onclick="openNuovo()">+ Nuovo ticket</button>
  </div>
</div>

<div class="metrics-bar">
  <div class="metric"><div class="metric-label">Totale</div><div class="metric-value" id="mTot">—</div></div>
  <div class="metric"><div class="metric-label">Aperti</div><div class="metric-value amber" id="mAp">—</div></div>
  <div class="metric"><div class="metric-label">In lavorazione</div><div class="metric-value blue" id="mLav">—</div></div>
  <div class="metric"><div class="metric-label">SLA scaduti</div><div class="metric-value red" id="mSca">N/D</div></div>
  <div class="metric"><div class="metric-label">Chiusi oggi</div><div class="metric-value green" id="mChi">—</div></div>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="search" placeholder="Cerca N° chiamata, ubicazione, guasto, cliente..." oninput="renderTable()">
  </div>
  <div class="tab-group">
    <button class="tab active" onclick="setTab('tutti',this)">Tutti</button>
    <button class="tab" onclick="setTab('Aperto',this)">Aperti</button>
    <button class="tab" onclick="setTab('In lavorazione',this)">In lavorazione</button>
    <button class="tab" onclick="setTab('Chiuso',this)">Chiusi</button>
  </div>
  <select id="fApp" onchange="renderTable()">
    <option value="">Tutte le appaltatrici</option>
    <option>GTN</option>
    <option>Mercurio Sistemi</option>
    <option>Distribution Service</option>
    <option>Sipos</option>
  </select>

</div>

<div class="table-wrap">
  <table>
    <thead><tr>
      <th style="width:105px">N° chiamata</th>
      <th style="width:75px">Data</th>
      <th style="width:200px">Ubicazione</th>
      <th style="width:180px">Indirizzo</th>
      <th style="width:160px">Guasto</th>
      <th style="width:130px">Appaltatrice</th>
      <th style="width:110px">Stato</th>
    </tr></thead>
    <tbody id="tbody">
      <tr><td colspan="7" class="empty-state"><div class="empty-icon">⏳</div><p>Caricamento ticket...</p></td></tr>
    </tbody>
  </table>
</div>

<!-- DETAIL PANEL -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closePanel()"></div>
<div class="panel" id="panel" style="display:none">
  <div class="panel-header">
    <div>
      <div class="panel-title" id="pTitle">—</div>
      <div class="panel-sub" id="pSub">—</div>
    </div>
    <button class="btn-close" onclick="closePanel()">✕</button>
  </div>

  <div class="section">
    <div class="section-title">Stato intervento</div>
    <div class="status-btns">
      <button class="btn-st" id="bAp" onclick="cambiaStato('Aperto')">Aperto</button>
      <button class="btn-st" id="bLav" onclick="cambiaStato('In lavorazione')">In lavorazione</button>
      <button class="btn-st" id="bChi" onclick="cambiaStato('Chiuso')">Chiuso</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Dettagli ticket</div>
    <div class="field-grid" id="pFields"></div>
  </div>

  <div class="section">
    <div class="section-title">Note operative</div>
    <textarea class="note-area" id="noteArea" placeholder="Aggiungi note, aggiornamenti o istruzioni per l'intervento..."></textarea>
    <button class="btn-save" id="btnSaveNote" onclick="salvaNota()">Salva nota</button>
  </div>
</div>

<!-- MODAL NUOVO TICKET -->
<div class="modal-overlay" id="modalOv" onclick="if(event.target===this)closeNuovo()">
  <div class="modal">
    <div class="modal-title">Nuovo ticket manuale</div>
    <div class="form-grid">
      <div class="form-field"><label class="form-label">N° chiamata *</label><input class="form-input" id="nNum" placeholder="es. TK-001-SIPOS"></div>
      <div class="form-field"><label class="form-label">Appaltatrice</label>
        <select class="form-input" id="nApp">
          <option>Sipos</option><option>GTN</option><option>Mercurio Sistemi</option><option>Distribution Service</option>
        </select>
      </div>
      <div class="form-field"><label class="form-label">Data *</label><input class="form-input" id="nData" type="date"></div>
      <div class="form-field"><label class="form-label">Ora</label><input class="form-input" id="nOra" type="time"></div>
      <div class="form-field"><label class="form-label">SLA</label>
        <select class="form-input" id="nSla"><option>4h</option><option>8h</option><option>2h</option><option>NBD</option></select>
      </div>
      <div class="form-field"><label class="form-label">Inserita da</label><input class="form-input" id="nIns" placeholder="Nome operatore"></div>
      <div class="form-field full"><label class="form-label">Cliente</label><input class="form-input" id="nCli" placeholder="es. MD S.p.A."></div>
      <div class="form-field full"><label class="form-label">Ubicazione *</label><input class="form-input" id="nUbi" placeholder="es. MD - GARLASCO 300953"></div>
      <div class="form-field full"><label class="form-label">Indirizzo</label><input class="form-input" id="nInd" placeholder="es. Via Roma 1, Garlasco (PV)"></div>
      <div class="form-field full"><label class="form-label">Guasto *</label><input class="form-input" id="nGua" placeholder="es. Cassa bloccata"></div>
      <div class="form-field full"><label class="form-label">Note</label><input class="form-input" id="nNote" placeholder="Note aggiuntive"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeNuovo()">Annulla</button>
      <button class="btn-confirm" id="btnConf" onclick="salvaTicket()">Salva ticket</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── CONFIGURAZIONE ───────────────────────────────────────────────
const SHEET_ID   = '1G0Ro9pfFC1HJZDS0Gagz56wC07x8kHTZdrAqfqv_kWM';
const SHEET_NAME = 'Ticket';
const WEBHOOK    = 'https://hook.eu1.make.com/274dvhyhrb1fl438penmwn7grcdw3r12';
const API_PROXY  = 'https://corsproxy.io/?' + encodeURIComponent('https://docs.google.com/spreadsheets/d/1G0Ro9pfFC1HJZDS0Gagz56wC07x8kHTZdrAqfqv_kWM/export?format=csv&sheet=Ticket');
// ─────────────────────────────────────────────────────────────────

let allTickets = [];
let currentTab = 'tutti';
let activeRow  = null;

const SLA_MS = { '2h':7200000, '4h':14400000, '8h':28800000, 'NBD':86400000 };

// ── DATA HELPERS ──────────────────────────────────────────────────
function parseItalianDate(d, t) {
  if (!d) return null;
  try {
    const ds = String(d).trim();
    const ts = String(t||'08:00').trim().substring(0,5);
    if (ds.includes('/')) {
      const [dd,mm,yyyy] = ds.split('/');
      return new Date(`${yyyy}-${String(mm).padStart(2,'0')}-${String(dd).padStart(2,'0')}T${ts}:00`);
    }
    return new Date(ds + 'T' + ts + ':00');
  } catch(e) { return null; }
}

function slaInfo(t) {
  if (t.Stato === 'Chiuso') return { pct:100, label:'Chiuso', color:'#1D9E75', expired:false };
  const dt = parseItalianDate(t.Data, t.Ora);
  if (!dt || isNaN(dt)) return { pct:0, label:'—', color:'#9B9990', expired:false };
  const ms  = SLA_MS[t.SLA] || SLA_MS['8h'];
  const el  = Date.now() - dt.getTime();
  const pct = Math.min(100, Math.round(el / ms * 100));
  const rem = Math.max(0, ms - el);
  const h   = Math.floor(rem / 3600000);
  const m   = Math.floor((rem % 3600000) / 60000);
  const exp = el > ms;
  const lbl = exp ? 'Scaduto' : (h > 0 ? `${h}h ${m}m` : `${m}m`);
  const col = pct >= 100 ? '#E24B4A' : pct >= 70 ? '#EF9F27' : '#1D9E75';
  return { pct, label:lbl, color:col, expired:exp };
}

function statoBadge(stato, exp) {
  if (exp && stato !== 'Chiuso') return '<span class="badge b-scaduto">SLA scaduto</span>';
  if (stato === 'Chiuso')        return '<span class="badge b-chiuso">Chiuso</span>';
  if (stato === 'In lavorazione')return '<span class="badge b-lav">In lavorazione</span>';
  return '<span class="badge b-aperto">Aperto</span>';
}

// ── LOAD DATA via CSV proxy ───────────────────────────────────────
async function loadTickets() {
  setSyncLoading();
  try {
    const res = await fetch(API_PROXY + '&t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const csv = await res.text();
    if (!csv || csv.trim().length < 5) throw new Error('Risposta vuota');
    const rows = csvParse(csv);
    if (rows.length < 2) { allTickets = []; renderTable(); setSyncOk(); return; }
    const headers = rows[0].map(h => (h||'').trim());
    allTickets = rows.slice(1)
      .filter(r => r && r[0] && r[0].trim())
      .map((r, i) => {
        const obj = { _row: i + 2 };
        headers.forEach((h, j) => {
          const raw = r[j] != null ? String(r[j]) : '';
          obj[h] = raw.replace(/\n/g, ' ').replace(/\r/g, '').replace(/\\n/g, ' ').trim();
        });
        return obj;
      })
      .filter(t => t['N° chiamata'] && t['N° chiamata'].length > 0);
    renderTable();
    setSyncOk();
  } catch(e) {
    setSyncError();
    showToast('Errore caricamento: ' + e.message, 'err');
  }
}

function csvParse(text) {
  const rows = [];
  let row = [], field = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"' && text[i+1] === '"') { field += '"'; i++; }
      else if (c === '"') inQ = false;
      else field += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c === '\r') {}
      else field += c;
    }
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows;
}

// ── RENDER TABLE ──────────────────────────────────────────────────
function filtered() {
  const q  = document.getElementById('search').value.toLowerCase();
  const fa = document.getElementById('fApp').value;
  const fs = document.getElementById('fSla').value;
  return allTickets.filter(t => {
    if (currentTab !== 'tutti' && t['Stato'] !== currentTab) return false;
    if (fa && t['Appaltatrice'] !== fa) return false;
    if (fs && t['SLA'] !== fs) return false;
    if (q) {
      const hay = [t['N° chiamata'],t['Ubicazione'],t['Indirizzo'],t['Guasto'],t['Cliente'],t['Appaltatrice']].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function detectAppaltatrice(t) {
  if (t['Appaltatrice'] && t['Appaltatrice'] !== '—' && t['Appaltatrice'] !== '') return t['Appaltatrice'];
  const num = t['N° chiamata'] || '';
  if (num.endsWith('-26GT') || num.endsWith('-25GT')) return 'GTN';
  if (num.endsWith('-26MS') || num.endsWith('-25MS')) return 'Mercurio Sistemi';
  if (num.endsWith('-26DS') || num.endsWith('-25DS')) return 'Distribution Service';
  return '—';
}

function renderTable() {
  const rows = filtered();
  const tbody = document.getElementById('tbody');
  updateMetrics();
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">📭</div><p>Nessun ticket trovato</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(t => {
    const clean = v => (v||'').replace(/\\n/g,'').replace(/\n/g,'').trim() || '—';
    return `<tr onclick="openPanel(${t._row})">
      <td><span class="ticket-id">${clean(t['N° chiamata'])}</span></td>
      <td>${clean(t['Data'])}</td>
      <td><span class="ubicazione-cell">${clean(t['Ubicazione'])}</span></td>
      <td><span class="indirizzo-cell">${clean(t['Indirizzo'])}</span></td>
      <td>${clean(t['Guasto'])}</td>
      <td><span class="badge b-app">${clean(t['Appaltatrice'])}</span></td>
      <td>${statoBadge(t['Stato'], false)}</td>
    </tr>`;
  }).join('');
}

function updateMetrics() {
  const today = new Date().toLocaleDateString('it-IT');
  document.getElementById('mTot').textContent = allTickets.length || '0';
  document.getElementById('mAp').textContent  = allTickets.filter(t => t['Stato']==='Aperto').length;
  document.getElementById('mLav').textContent = allTickets.filter(t => t['Stato']==='In lavorazione').length;
  document.getElementById('mSca').textContent = allTickets.filter(t => !t['Appaltatrice'] || t['Appaltatrice'] === '—').length;
  document.getElementById('mChi').textContent = allTickets.filter(t => {
    if (t['Stato']!=='Chiuso') return false;
    const dt = parseItalianDate(t['Data'], t['Ora']);
    if (!dt) return false;
    return dt.toLocaleDateString('it-IT') === today;
  }).length;
}

function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

// ── DETAIL PANEL ──────────────────────────────────────────────────
function openPanel(row) {
  const t = allTickets.find(x => x._row === row);
  if (!t) return;
  activeRow = row;
  document.getElementById('pTitle').textContent = t['Ubicazione'] || t['N° chiamata'] || '—';
  document.getElementById('pSub').textContent   = (t['N° chiamata']||'') + ' — ' + (t['Appaltatrice']||'');
  const fields = [
    ['N° chiamata', t['N° chiamata']||'—', false, 'mono'],
    ['Data / Ora',  (t['Data']||'—') + ' ' + (t['Ora']||''), false, ''],
    ['Cliente', t['Cliente']||'—', true, ''],
    ['Indirizzo', t['Indirizzo']||'—', true, ''],
    ['Guasto', t['Guasto']||'—', true, ''],
    ['Appaltatrice', detectAppaltatrice(t), false, ''],
    ['Inserita da', t['Inserita da']||'—', false, ''],
    ['Prodotto', t['Prodotto']||'—', false, ''],
    ['Matricola', t['Matricola']||'—', false, 'mono'],
  ];
  document.getElementById('pFields').innerHTML = fields.map(([lbl,val,full,cls]) =>
    `<div class="field${full?' full':''}">
      <div class="field-label">${lbl}</div>
      <div class="field-value ${cls}">${val}</div>
    </div>`
  ).join('');
  document.getElementById('noteArea').value = t['Note'] || '';
  aggiornaStato(t['Stato']);
  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').style.display = 'block';
}

function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('panel').style.display = 'none';
  activeRow = null;
}

function aggiornaStato(stato) {
  document.getElementById('bAp').className  = 'btn-st' + (stato==='Aperto'          ? ' s-aperto' : '');
  document.getElementById('bLav').className = 'btn-st' + (stato==='In lavorazione'  ? ' s-lav'    : '');
  document.getElementById('bChi').className = 'btn-st' + (stato==='Chiuso'          ? ' s-chiuso' : '');
}

// ── WEBHOOK WRITE ─────────────────────────────────────────────────
async function sendToWebhook(payload) {
  const res = await fetch(WEBHOOK, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  if (!res.ok) throw new Error('Webhook error ' + res.status);
  return res;
}

async function cambiaStato(stato) {
  if (!activeRow) return;
  const t = allTickets.find(x => x._row === activeRow);
  if (!t) return;
  try {
    setSyncLoading();
    await sendToWebhook({ row: activeRow, stato, note: t['Note']||'' });
    t['Stato'] = stato;
    aggiornaStato(stato);
    renderTable();
    setSyncOk();
    showToast('Stato aggiornato: ' + stato, 'ok');
  } catch(e) {
    setSyncError();
    showToast('Errore aggiornamento stato', 'err');
  }
}

async function salvaNota() {
  if (!activeRow) return;
  const t    = allTickets.find(x => x._row === activeRow);
  const nota = document.getElementById('noteArea').value;
  const btn  = document.getElementById('btnSaveNote');
  try {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';
    setSyncLoading();
    await sendToWebhook({ row: activeRow, stato: t['Stato']||'Aperto', note: nota });
    t['Note'] = nota;
    setSyncOk();
    showToast('Nota salvata', 'ok');
  } catch(e) {
    setSyncError();
    showToast('Errore salvataggio nota', 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Salva nota';
  }
}

// ── NUOVO TICKET ──────────────────────────────────────────────────
function openNuovo() {
  const oggi = new Date();
  document.getElementById('nData').value = oggi.toISOString().split('T')[0];
  document.getElementById('nOra').value  = oggi.toTimeString().slice(0,5);
  ['nNum','nCli','nUbi','nInd','nGua','nIns','nNote'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('modalOv').classList.add('open');
}
function closeNuovo() { document.getElementById('modalOv').classList.remove('open'); }

async function salvaTicket() {
  const g = id => document.getElementById(id).value.trim();
  if (!g('nNum') || !g('nUbi') || !g('nGua')) {
    showToast('Compila: N° chiamata, Ubicazione e Guasto', 'err');
    return;
  }
  const [yyyy,mm,dd] = g('nData').split('-');
  const dataIt = `${dd}/${mm}/${yyyy}`;
  const payload = {
    action: 'add',
    'N° chiamata': g('nNum'),
    'Data': dataIt,
    'Ora': g('nOra'),
    'Inserita da': g('nIns'),
    'Cliente': g('nCli'),
    'Sede': '',
    'Ubicazione': g('nUbi'),
    'Indirizzo': g('nInd'),
    'Prodotto': '',
    'Matricola': '',
    'Guasto': g('nGua'),
    'SLA': g('nSla'),
    'Appaltatrice': g('nApp'),
    'Stato': 'Aperto',
    'Note': g('nNote')
  };
  const btn = document.getElementById('btnConf');
  try {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Salvataggio...';
    setSyncLoading();
    await sendToWebhook(payload);
    closeNuovo();
    await loadTickets();
    showToast('Ticket creato correttamente', 'ok');
  } catch(e) {
    setSyncError();
    showToast('Errore creazione ticket', 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Salva ticket';
  }
}

// ── UI HELPERS ────────────────────────────────────────────────────
function setSyncLoading() {
  document.getElementById('syncDot').className   = 'sync-dot loading';
  document.getElementById('syncLabel').textContent = 'Aggiornamento...';
}
function setSyncOk() {
  document.getElementById('syncDot').className   = 'sync-dot';
  const now = new Date().toLocaleTimeString('it-IT', {hour:'2-digit',minute:'2-digit'});
  document.getElementById('syncLabel').textContent = 'Aggiornato ' + now;
}
function setSyncError() {
  document.getElementById('syncDot').className   = 'sync-dot error';
  document.getElementById('syncLabel').textContent = 'Errore connessione';
}

let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = 'toast', 3500);
}

// ── INIT ──────────────────────────────────────────────────────────
loadTickets();
setInterval(loadTickets, 120000); // auto-refresh ogni 2 minuti
</script>
